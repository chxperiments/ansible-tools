name: Container CI/CD

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_NAME_DOCKERHUB: ${{ github.event.repository.name }}
  REGISTRY_GHCR: ghcr.io
  REGISTRY_QUAY: quay.io
  REGISTRY_DOCKERHUB: docker.io

jobs:
  test:
    name: Build and Test Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for tests
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: false
          load: true
          tags: test-target:latest
          cache-from: type=gha

      - name: Smoke test Ansible CLI
        run: docker run --rm test-target:latest ansible --version

      - name: Smoke test ansible-lint
        run: docker run --rm test-target:latest ansible-lint --version

      - name: Verify installed collections
        run: |
          docker run --rm test-target:latest /bin/sh -c "set -e; for col in community.general community.crypto; do ansible-galaxy collection list | grep -q \"${col}\"; done"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
            ${{ env.REGISTRY_QUAY }}/${{ secrets.QUAY_USERNAME }}/${{ env.IMAGE_NAME }}
            ${{ env.REGISTRY_DOCKERHUB }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Quay
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_QUAY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image locally for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: false
          load: true
          tags: scan-target:latest
          cache-from: type=gha

      - name: Anchore Grype vulnerability scan
        uses: anchore/scan-action@v7
        with:
          image: scan-target:latest
          severity-cutoff: high
          fail-build: false

      - name: Export SARIF from Grype
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            anchore/grype:latest \
            scan-target:latest -o sarif > grype-results.sarif || true

      - name: Upload SARIF as artifact (PRs)
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: grype-sarif
          path: grype-results.sarif

      - name: Upload Anchore SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() && github.event_name != 'pull_request'
        with:
          sarif_file: grype-results.sarif
          category: anchore-grype
